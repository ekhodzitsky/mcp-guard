# Server names (e.g., "echo", "filesystem") are arbitrary user-defined identifiers.
# They are used to reference the server in logs, metrics, and the guard's routing table.

[server.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
timeout = { tools_call = "30s", tools_list = "10s" }
restart = { max_attempts = 5, backoff = "exponential" }
permissions = { allow = ["read_file", "list_directory"], deny = ["write_file", "delete_file"] }
rate_limit = { rpm = 60, rpd = 1000 }

[server.echo]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-echo"]
timeout = { tools_call = "30s", tools_list = "10s" }
restart = { max_attempts = 5, backoff = "exponential" }

[guard]
health_check_interval = "5s"
audit_log_path = "~/.mcp-guard/audit"
schema_cache_ttl = "5m"
max_concurrent_calls = 100

[api]
enabled = true
addr = "localhost:8787"
