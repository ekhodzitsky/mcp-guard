version: 2

builds:
  - id: mcp-guard
    main: ./cmd/mcp-guard
    binary: mcp-guard
    env:
      - CGO_ENABLED=1
    # Darwin builds require a macOS runner due to CGO and the macOS SDK.
    # Extend this list later when a macOS builder is available.
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
