run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - misspell
    - prealloc
    - unconvert
    - gocritic
    - gosec

linters-settings:
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: indent-error-flow

issues:
  exclude-use-default: false
